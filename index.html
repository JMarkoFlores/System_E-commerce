<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Recomendación IA</title>
  <script>
    (function () {
      try {
        const theme = localStorage.getItem('techstore-theme');
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        }
        const lang = localStorage.getItem('techstore-lang');
        if (lang === 'en') {
          document.documentElement.lang = 'en';
        }
      } catch (e) {
        // Ignorar errores de localStorage
      }
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
